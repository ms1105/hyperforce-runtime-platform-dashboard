image: alpine:latest

pages:
  stage: deploy
  script:
    - echo "Deploying static files to GitLab Pages"
    - mkdir -p public
    # Copy all HTML files
    - cp *.html public/ 2>/dev/null || true
    # Copy assets directory
    - cp -r assets public/ 2>/dev/null || true
    # Copy dist directory contents if it exists
    - cp -r dist/* public/ 2>/dev/null || true
    # List what was copied for debugging
    - echo "Files in public directory:"
    - ls -la public/ || true
    - echo "Assets directory:"
    - ls -la public/assets/ || true
    - echo "Assets/data directory:"
    - ls -la public/assets/data/ || true
    - echo "Verifying Cost to Serve data files exist:"
    - ls -la public/assets/data/cts-data.json || echo "WARNING: cts-data.json not found!"
    - ls -la public/assets/data/hcp-cts-forecast-actuals.json || echo "WARNING: hcp-cts-forecast-actuals.json not found!"
    - echo "Verifying Core CPU CSV files exist:"
    - ls -la public/assets/data/core-cpu/ || echo "WARNING: core-cpu directory not found!"
    - ls -lh public/assets/data/core-cpu/*.csv 2>/dev/null | head -10 || echo "WARNING: Core CPU CSV files not found!"
  artifacts:
    paths:
      - public
  only:
    - master
    - main
