image: alpine:latest

pages:
  stage: deploy
  script:
    - echo "Deploying static files to GitLab Pages"
    - mkdir -p public
    # Copy index.html first (required)
    - cp index.html public/index.html
    # Copy any other root HTML
    - for f in *.html; do [ "$f" != "index.html" ] && [ -f "$f" ] && cp "$f" public/; done 2>/dev/null || true
    # Copy assets (required)
    - cp -r assets public/
    # Optional: merge dist into public if it exists
    - if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then cp -r dist/* public/; fi
    # Validate artifact (fail fast so we never publish broken deploy)
    - test -f public/index.html || (echo "ERROR: public/index.html missing" && exit 1)
    - test -d public/assets || (echo "ERROR: public/assets missing" && exit 1)
    - test -d public/assets/css || (echo "ERROR: public/assets/css missing" && exit 1)
    - test -d public/assets/js || (echo "ERROR: public/assets/js missing" && exit 1)
    - echo "Artifact valid. Contents:"
    - ls -la public/
    - ls -la public/assets/ | head -20
  artifacts:
    paths:
      - public
  only:
    - main
    - master
