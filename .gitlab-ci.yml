image: alpine:latest

pages:
  stage: deploy
  script:
    - echo "Deploying static files to GitLab Pages"
    - mkdir -p public
    # Copy all HTML files
    - cp *.html public/ 2>/dev/null || true
    # Copy assets directory
    - cp -r assets public/ 2>/dev/null || true
    # Copy dist directory contents if it exists
    - cp -r dist/* public/ 2>/dev/null || true
    # List what was copied for debugging
    - echo "Files in public directory:"
    - ls -la public/ || true
    - echo "Assets directory:"
    - ls -la public/assets/ || true
  artifacts:
    paths:
      - public
  only:
    - master
    - main
